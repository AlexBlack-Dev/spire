name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (npm)
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install dependencies (npm)
        run: npm ci

      - name: Initialize Tauri Android
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            npx tauri android init
          else
            echo "Android project already initialized, skipping"
          fi

      - name: Setup Gradle permissions
        run: chmod +x src-tauri/gen/android/gradlew

      - name: Build Android APK
        run: npx tauri android build --target aarch64
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/windows

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: android-apk
          path: artifacts/android

      - name: List artifacts
        run: find artifacts/ -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Spire ${{ github.ref_name }}

            ### Downloads
            - **Windows**: [EXE (NSIS installer)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SPIRE_1.0.0_x64-setup.exe), [MSI](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SPIRE_1.0.0_x64_en-US.msi)
            - **Android**: [APK (aarch64)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/spire.apk)

            ### Features
            - Rich-text editor (Tiptap), tasks, notes, trash
            - Dark/light themes with custom accent colors
            - Note locking with password
            - File browser with in-app file saving
            - Russian and English languages
            - Splash screen, back navigation, anti-paste protection
          files: |
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.msi
            artifacts/android/**/*.apk
